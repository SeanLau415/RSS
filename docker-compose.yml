services:
  showtimes-vps:
    build:
      context: .
    container_name: showtimes-vps
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
